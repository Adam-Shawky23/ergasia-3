{% extends 'base.html' %}
{% block title %}Create Album — k29photo{% endblock %}
{% block content %}
<div class="form-page">
  <h1>New Album</h1>
  <form action="{{ url_for('albums.create_album') }}" method="post" class="form-card">
    <label>Album Name *
      <input type="text" name="name" class="input" required autofocus placeholder="e.g. Summer in Nafplion">
    </label>
    <button type="submit" class="btn btn-primary">Create Album</button>
  </form>
</div>
{% endblock %}
