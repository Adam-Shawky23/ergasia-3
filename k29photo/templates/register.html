{% extends 'base.html' %}
{% block title %}Register — k29photo{% endblock %}
{% block content %}
<div class="form-page">
  <h1>Create Account</h1>
  <form action="{{ url_for('auth.register') }}" method="post" class="form-card">
    <div class="form-row">
      <label>First Name *
        <input type="text" name="first_name" class="input" required>
      </label>
      <label>Last Name *
        <input type="text" name="last_name" class="input" required>
      </label>
    </div>
    <label>Email *
      <input type="email" name="email" class="input" required>
    </label>
    <label>Password *
      <input type="password" name="password" class="input" required>
    </label>
    <div class="form-row">
      <label>Date of Birth
        <input type="date" name="dob" class="input">
      </label>
      <label>Gender
        <select name="gender" class="input">
          <option value="">Prefer not to say</option>
          <option value="M">Male</option>
          <option value="F">Female</option>
          <option value="O">Other</option>
        </select>
      </label>
    </div>
    <label>Hometown
      <input type="text" name="hometown" class="input" placeholder="e.g. Athens">
    </label>
    <button type="submit" class="btn btn-primary">Create Account</button>
    <p class="form-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
  </form>
</div>
{% endblock %}
