{% extends 'base.html' %}
{% block title %}Register — Pixora{% endblock %}

{% block content %}
<div class="form-page">
  <h1>Create account</h1>

  <div class="form-card">
    <form method="post">

      <div class="form-row">
        <label>First name
          <input type="text" name="first_name" class="input" required autofocus>
        </label>
        <label>Last name
          <input type="text" name="last_name" class="input" required>
        </label>
      </div>

      <label>Email
        <input type="email" name="email" class="input" required>
      </label>

      <label>Password
        <input type="password" name="password" class="input" required
               minlength="6" placeholder="Minimum 6 characters">
      </label>

      <label>Date of birth
        <input type="date" name="dob" class="input"
               max="{{ today }}"
               min="1900-01-01">
        <span class="hint">Must be in the past. Optional.</span>
      </label>

      <label>Hometown (optional)
        <input type="text" name="hometown" class="input" placeholder="e.g. Athens">
      </label>

      <label>Gender (optional)
        <select name="gender" class="input">
          <option value="">— Select —</option>
          <option value="F">Female</option>
          <option value="M">Male</option>
          <option value="O">Other / Prefer not to say</option>
        </select>
      </label>

      <button type="submit" class="btn btn-primary"
              style="width:100%; justify-content:center; margin-top:0.5rem; padding:0.75rem;">
        Create account
      </button>
    </form>
  </div>

  <p class="form-footer">
    Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
  </p>
</div>
{% endblock %}
