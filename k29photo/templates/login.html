<!-- ========== login.html ========== -->
{% extends 'base.html' %}
{% block title %}Login — k29photo{% endblock %}
{% block content %}
<div class="form-page">
  <h1>Login</h1>
  <form action="{{ url_for('auth.login') }}" method="post" class="form-card">
    <label>Email
      <input type="email" name="email" class="input" required autofocus>
    </label>
    <label>Password
      <input type="password" name="password" class="input" required>
    </label>
    <button type="submit" class="btn btn-primary">Login</button>
    <p class="form-footer">No account? <a href="{{ url_for('auth.register') }}">Register here</a></p>
  </form>
</div>
{% endblock %}
